name: Publish To Central

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
          clean: true

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: "8"
          distribution: "temurin"
          cache: "sbt"

      - uses: sbt/setup-sbt@v1
        with:
          sbt-runner-version: 1.10.2

      - name: Import GPG key
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: |
          set -euo pipefail
          umask 077

          if [[ -z "${PGP_SECRET}" || -z "${PGP_PASSPHRASE}" ]]; then
            echo "Missing GPG secrets" >&2
            exit 1
          fi

          echo "::add-mask::${PGP_SECRET}"
          echo "::add-mask::${PGP_PASSPHRASE}"

          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"
          echo "GNUPGHOME=${GNUPGHOME}" >> "${GITHUB_ENV}"

          key_file="$(mktemp "${RUNNER_TEMP}/gpg-key.XXXXXX.asc")"
          cleanup() {
            rm -f "${key_file}"
            gpgconf --kill gpg-agent || true
          }
          trap cleanup EXIT

          cat > "${GNUPGHOME}/gpg.conf" <<'EOF'
          use-agent
          pinentry-mode loopback
          batch
          EOF

          cat > "${GNUPGHOME}/gpg-agent.conf" <<'EOF'
          allow-loopback-pinentry
          EOF

          gpgconf --kill gpg-agent || true

          if [[ "${PGP_SECRET}" == *"BEGIN PGP PRIVATE KEY BLOCK"* ]]; then
            printf '%s\n' "${PGP_SECRET}" > "${key_file}"
          else
            printf '%s' "${PGP_SECRET}" | base64 --decode > "${key_file}"
          fi

          gpg --batch --quiet --yes --pinentry-mode loopback --passphrase "${PGP_PASSPHRASE}" --import "${key_file}"

          fingerprint="$(gpg --batch --with-colons --list-secret-keys | awk -F: '$1 == "fpr" { print $10; exit }')"
          if [[ -z "${fingerprint}" ]]; then
            echo "No secret key was imported" >&2
            exit 1
          fi

          printf '%s:6:\n' "${fingerprint}" | gpg --batch --import-ownertrust

      - name: Publish signed artifacts to Sonatype bundle
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [[ -z "${SONATYPE_USERNAME}" || -z "${SONATYPE_PASSWORD}" || -z "${PGP_PASSPHRASE}" ]]; then
            echo "Missing publish secrets" >&2
            exit 1
          fi

          echo "::add-mask::${SONATYPE_USERNAME}"
          echo "::add-mask::${SONATYPE_PASSWORD}"
          echo "::add-mask::${PGP_PASSPHRASE}"

          sbt -batch \
            "set pgpPassphrase := Some(\"${PGP_PASSPHRASE}\".toCharArray)" \
            "++2.12.21!" \
            clean \
            package \
            packageSrc \
            packageDoc \
            publishSigned

          sbt -batch \
            "set pgpPassphrase := Some(\"${PGP_PASSPHRASE}\".toCharArray)" \
            "++2.13.18!" \
            package \
            packageSrc \
            packageDoc \
            publishSigned

      - name: Upload Sonatype bundle with retry
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${SONATYPE_USERNAME}" || -z "${SONATYPE_PASSWORD}" ]]; then
            echo "Missing Sonatype credentials" >&2
            exit 1
          fi

          echo "::add-mask::${SONATYPE_USERNAME}"
          echo "::add-mask::${SONATYPE_PASSWORD}"

          attempt=1
          max_attempts=3
          delay_seconds=30

          while true; do
            if sbt -batch sonatypeBundleRelease; then
              break
            fi

            if (( attempt >= max_attempts )); then
              echo "sonatypeBundleRelease failed after ${attempt} attempts" >&2
              exit 1
            fi

            echo "sonatypeBundleRelease attempt ${attempt} failed, retrying in ${delay_seconds}s..." >&2
            sleep "${delay_seconds}"
            attempt=$((attempt + 1))
            delay_seconds=$((delay_seconds * 2))
          done
