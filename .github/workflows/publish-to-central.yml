name: Publish To Central

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
          clean: true

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: "8"
          distribution: "temurin"
          cache: "sbt"

      - uses: sbt/setup-sbt@v1
        with:
          sbt-runner-version: 1.10.2

      - name: Import GPG key
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: |
          set -euo pipefail
          umask 077

          if [[ -z "${PGP_SECRET}" || -z "${PGP_PASSPHRASE}" ]]; then
            echo "Missing GPG secrets" >&2
            exit 1
          fi

          echo "::add-mask::${PGP_SECRET}"
          echo "::add-mask::${PGP_PASSPHRASE}"

          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"
          echo "GNUPGHOME=${GNUPGHOME}" >> "${GITHUB_ENV}"

          key_file="$(mktemp "${RUNNER_TEMP}/gpg-key.XXXXXX.asc")"
          cleanup() {
            rm -f "${key_file}"
            gpgconf --kill gpg-agent || true
          }
          trap cleanup EXIT

          cat > "${GNUPGHOME}/gpg.conf" <<'EOF'
          use-agent
          pinentry-mode loopback
          batch
          EOF

          cat > "${GNUPGHOME}/gpg-agent.conf" <<'EOF'
          allow-loopback-pinentry
          EOF

          gpgconf --kill gpg-agent || true

          if [[ "${PGP_SECRET}" == *"BEGIN PGP PRIVATE KEY BLOCK"* ]]; then
            printf '%s\n' "${PGP_SECRET}" > "${key_file}"
          else
            printf '%s' "${PGP_SECRET}" | base64 --decode > "${key_file}"
          fi

          gpg --batch --quiet --yes --pinentry-mode loopback --passphrase "${PGP_PASSPHRASE}" --import "${key_file}"

          fingerprint="$(gpg --batch --with-colons --list-secret-keys | awk -F: '$1 == "fpr" { print $10; exit }')"
          if [[ -z "${fingerprint}" ]]; then
            echo "No secret key was imported" >&2
            exit 1
          fi

          printf '%s:6:\n' "${fingerprint}" | gpg --batch --import-ownertrust

      - name: Stage signed artifacts locally
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [[ -z "${SONATYPE_USERNAME}" || -z "${SONATYPE_PASSWORD}" || -z "${PGP_PASSPHRASE}" ]]; then
            echo "Missing publish secrets" >&2
            exit 1
          fi

          echo "::add-mask::${SONATYPE_USERNAME}"
          echo "::add-mask::${SONATYPE_PASSWORD}"
          echo "::add-mask::${PGP_PASSPHRASE}"

          sbt -batch \
            "set pgpPassphrase := Some(\"${PGP_PASSPHRASE}\".toCharArray)" \
            "++2.12.21!" \
            clean \
            package \
            packageSrc \
            packageDoc \
            publishSigned

          sbt -batch \
            "set pgpPassphrase := Some(\"${PGP_PASSPHRASE}\".toCharArray)" \
            "++2.13.18!" \
            package \
            packageSrc \
            packageDoc \
            publishSigned

      - name: Upload Sonatype bundle to Central Portal
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${SONATYPE_USERNAME}" || -z "${SONATYPE_PASSWORD}" ]]; then
            echo "Missing Sonatype credentials" >&2
            exit 1
          fi

          echo "::add-mask::${SONATYPE_USERNAME}"
          echo "::add-mask::${SONATYPE_PASSWORD}"

          if ! command -v jq >/dev/null 2>&1; then
            echo "jq is required but not available" >&2
            exit 1
          fi

          release_version="${GITHUB_REF_NAME#v}"
          build_version="$(grep -m1 '^ThisBuild / version := "' build.sbt | cut -d'"' -f2)"
          if [[ -z "${build_version}" ]]; then
            echo "Unable to determine build version from build.sbt" >&2
            exit 1
          fi

          if [[ "${release_version}" != "${build_version}" ]]; then
            echo "Tag version ${release_version} does not match build.sbt version ${build_version}" >&2
            exit 1
          fi

          staging_dir="target/sonatype-staging/${build_version}"
          if [[ ! -d "${staging_dir}" ]]; then
            echo "Expected staging directory ${staging_dir} does not exist" >&2
            exit 1
          fi

          while IFS= read -r -d '' artifact; do
            md5sum "${artifact}" | awk '{print $1}' > "${artifact}.md5"
            sha1sum "${artifact}" | awk '{print $1}' > "${artifact}.sha1"
          done < <(find "${staging_dir}" -type f \( -name '*.jar' -o -name '*.pom' \) ! -name '*.asc' -print0)

          bundle_path="${RUNNER_TEMP}/scala-refactoring-${build_version}-bundle.zip"
          rm -f "${bundle_path}"
          (
            cd "${staging_dir}"
            zip -qr "${bundle_path}" .
          )

          bundle_size="$(wc -c < "${bundle_path}")"
          if (( bundle_size > 1000000000 )); then
            echo "Bundle size ${bundle_size} exceeds Sonatype Central 1GB limit" >&2
            exit 1
          fi

          auth_token="$(printf '%s:%s' "${SONATYPE_USERNAME}" "${SONATYPE_PASSWORD}" | base64 | tr -d '\n')"
          deployment_name="scala-refactoring-${build_version}"
          upload_response="$(mktemp "${RUNNER_TEMP}/central-upload.XXXXXX")"
          trap 'rm -f "${upload_response}" "${bundle_path}"' EXIT

          http_code="$(
            curl --silent --show-error \
              --output "${upload_response}" \
              --write-out '%{http_code}' \
              --request POST \
              --connect-timeout 30 \
              --max-time 1800 \
              --header "Authorization: Bearer ${auth_token}" \
              --form "bundle=@${bundle_path};type=application/octet-stream" \
              "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC&name=${deployment_name}"
          )"

          if [[ "${http_code}" != "201" ]]; then
            echo "Central upload failed with HTTP ${http_code}" >&2
            cat "${upload_response}" >&2
            exit 1
          fi

          deployment_id="$(tr -d '\r\n' < "${upload_response}")"
          if [[ -z "${deployment_id}" ]]; then
            echo "Central upload did not return a deployment id" >&2
            exit 1
          fi

          echo "Created deployment ${deployment_id}"

          deadline=$((SECONDS + 1800))
          publish_requested=0

          while (( SECONDS < deadline )); do
            status_json="$(
              curl --fail --silent --show-error \
                --request POST \
                --header "Authorization: Bearer ${auth_token}" \
                "https://central.sonatype.com/api/v1/publisher/status?id=${deployment_id}"
            )"

            deployment_state="$(printf '%s' "${status_json}" | jq -r '.deploymentState')"
            echo "Deployment ${deployment_id} state: ${deployment_state}"

            case "${deployment_state}" in
              PENDING|VALIDATING|PUBLISHING)
                sleep 15
                ;;
              VALIDATED)
                if (( publish_requested == 0 )); then
                  curl --fail --silent --show-error \
                    --request POST \
                    --header "Authorization: Bearer ${auth_token}" \
                    "https://central.sonatype.com/api/v1/publisher/deployment/${deployment_id}" >/dev/null
                  publish_requested=1
                fi
                sleep 15
                ;;
              PUBLISHED)
                exit 0
                ;;
              FAILED)
                echo "Central deployment failed" >&2
                printf '%s\n' "${status_json}" | jq . >&2
                exit 1
                ;;
              *)
                echo "Unexpected deployment state: ${deployment_state}" >&2
                printf '%s\n' "${status_json}" | jq . >&2
                exit 1
                ;;
            esac
          done

          echo "Timed out waiting for Central deployment ${deployment_id} to publish" >&2
          exit 1
