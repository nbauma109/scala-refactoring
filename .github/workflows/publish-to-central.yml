name: Publish To Central

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: "8"
          distribution: "temurin"
          cache: "sbt"

      - uses: sbt/setup-sbt@v1
        with:
          sbt-runner-version: 1.10.2

      - name: Import GPG key
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        shell: bash
        run: |
          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"
          echo "GNUPGHOME=${GNUPGHOME}" >> "${GITHUB_ENV}"

          cat > "${GNUPGHOME}/gpg.conf" <<'EOF'
          use-agent
          pinentry-mode loopback
          batch
          EOF

          cat > "${GNUPGHOME}/gpg-agent.conf" <<'EOF'
          allow-loopback-pinentry
          EOF

          gpgconf --kill gpg-agent || true

          key_file="${RUNNER_TEMP}/private-key.asc"
          if [[ "${PGP_SECRET}" == *"BEGIN PGP PRIVATE KEY BLOCK"* ]]; then
            printf '%s\n' "${PGP_SECRET}" > "${key_file}"
          else
            printf '%s' "${PGP_SECRET}" | base64 --decode > "${key_file}"
          fi

          gpg --batch --yes --pinentry-mode loopback --passphrase "${PGP_PASSPHRASE}" --import "${key_file}"

          fingerprint="$(gpg --batch --with-colons --list-secret-keys | awk -F: '$1 == "fpr" { print $10; exit }')"
          if [[ -z "${fingerprint}" ]]; then
            echo "No secret key was imported" >&2
            exit 1
          fi

          printf '%s:6:\n' "${fingerprint}" | gpg --batch --import-ownertrust
          rm -f "${key_file}"

      - name: Publish signed artifacts to Maven Central
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: |
          sbt -batch \
            "set pgpPassphrase := Some(\"${PGP_PASSPHRASE}\".toCharArray)" \
            clean \
            +package \
            +packageSrc \
            +packageDoc \
            +publishSigned \
            sonatypeBundleRelease
