# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Scala CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 8
      uses: actions/setup-java@v5
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: 'sbt'
    - uses: sbt/setup-sbt@v1
      with:
        sbt-runner-version: 1.10.2
    - name: Run tests and publish local (2.12.21)
      shell: bash
      run: sbt -batch "++2.12.21!" clean test publishLocal
    - name: Compile and publish local (2.13.18)
      shell: bash
      run: sbt -batch "++2.13.18!" clean compile Test/compile publishLocal
