name: Update Version

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Semantic version component to bump"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        id: bump
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          current_version="$(grep -m1 '^ThisBuild / version := "' build.sbt | cut -d'"' -f2)"
          if [[ -z "${current_version}" ]]; then
            echo "Unable to determine current version from build.sbt" >&2
            exit 1
          fi
          base_version="${current_version%-SNAPSHOT}"

          IFS='.' read -r major minor patch <<EOF
          ${base_version}
          EOF

          case "${RELEASE_TYPE}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported release type: ${RELEASE_TYPE}" >&2
              exit 1
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          new_tag="v${new_version}"

          if git rev-parse "${new_tag}" >/dev/null 2>&1; then
            echo "Tag ${new_tag} already exists" >&2
            exit 1
          fi

          perl -0pi -e 's#^ThisBuild / version := "[^"]+"#ThisBuild / version := "'"${new_version}"'"#m' build.sbt

          git add build.sbt
          git commit -m "Release ${new_tag}"
          git tag -a "${new_tag}" -m "${new_tag}"

          echo "version=${new_version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${new_tag}" >> "${GITHUB_OUTPUT}"

      - name: Push branch and tag
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git push origin "HEAD:${DEFAULT_BRANCH}"
          git push origin "${{ steps.bump.outputs.tag }}"
